name: Pack and Attach Addon to Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Addon ZIP
        run: |
          mkdir WeintCodex

          rsync -a \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="WeintCodex" \
            --exclude=".gitignore" \
            --exclude="README.md" \
            --exclude="LICENSE" \
            ./ WeintCodex/

          zip -r WeintCodex.zip WeintCodex

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: WeintCodex.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
